version: "2"

destination: ./plugin

plugins:
  - module: 'github.com/example/plugin2'
    import: 'github.com/example/plugin4/foo'
    path: /home/sir_kirill/projects/go-linter/plugin/loglinter.so


#plugins:
#  enable:
#    - loglinter
#  local:
#    path: /home/sir_kirill/projects/go-linter/plugin/loglinter.so
#    description: "Checks log messages"
#    original-url: github.com/KPfromSainP/log-linter

linters:
  default: none
  enable:
    - loglinter

rules:
  lower-case: true
  spec-symbols: true
  check-english: true
  sensitive-data: true

patterns:
  sensitive-keywords:
    - password
    - passwd
    - pwd
    - api_key
    - apikey
    - api-key
    - secret
    - credential
    - credentials
    - private_key
    - privatekey
    - private-key
    - access_token
    - accesstoken
    - refresh_token
    - refreshtoken
    - bearer
    - aws_secret
    - db_password
    - database_password
    - token
  patterns:
    - (?i)%s\s*[:=]\s*